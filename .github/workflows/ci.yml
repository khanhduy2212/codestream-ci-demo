name: CodeStream CI Demo

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show Python version
        run: python --version

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run build step
        run: python app.py

      - name: Run unit test
        run: pytest -v

      - name: Create version file
        run: |
          echo "Version: demo-${GITHUB_SHA}" > version.txt

      - name: Update staging version in HTML
        run: |
          sed -i "s/Version: demo-v1/Version: demo-${GITHUB_SHA}/" index.html

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: codestream-version
          path: version.txt

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy-staging:
    needs: build-and-test
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Staging
        id: deployment
        uses: actions/deploy-pages@v4

  smoke-test:
    needs: deploy-staging
    runs-on: ubuntu-latest

    steps:
      - name: Run smoke test
        run: |
          URL="https://khanhduy2212.github.io/codestream-ci-demo/"
          echo "Checking staging URL: $URL"

          curl -L "$URL" -o response.html

          echo "Checking if page contains expected title..."
          grep "CodeStream - Staging Environment" response.html

          echo "Checking if deploy status is success..."
          grep "Deploy success" response.html

          echo "Checking if environment is staging..."
          grep "Environment: Staging" response.html

          echo "Smoke test passed successfully."
