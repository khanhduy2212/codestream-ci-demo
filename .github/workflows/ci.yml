name: CodeStream CI Demo

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show Python version
        run: python --version

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run build step
        run: python app.py

      - name: Run unit test
        run: pytest -v

      - name: Create version file
        run: echo "Version: demo-${GITHUB_SHA}" > version.txt

      - name: Update staging version in HTML
        run: sed -i "s/Version: demo-v1/Version: demo-${GITHUB_SHA}/" index.html

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: codestream-version
          path: version.txt

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy-staging:
    needs: build-and-test
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Staging
        id: deployment
        uses: actions/deploy-pages@v4
